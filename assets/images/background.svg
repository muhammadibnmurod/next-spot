<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040d20"/>
      <stop offset="55%" stop-color="#0c1c40"/>
      <stop offset="100%" stop-color="#1a3060"/>
    </linearGradient>
    <linearGradient id="bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2d5a"/>
      <stop offset="100%" stop-color="#080e22"/>
    </linearGradient>
    <linearGradient id="bldgDk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1830"/>
      <stop offset="100%" stop-color="#040a18"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1228"/>
      <stop offset="100%" stop-color="#020408"/>
    </linearGradient>
    <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8ab4f8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8ab4f8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cityGlow" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1a3fbb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a3fbb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- SKY -->
  <rect width="1200" height="800" fill="url(#sky)"/>

  <!-- STARS -->
