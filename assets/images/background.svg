    <circle cx="130"  cy="72"  r="1.5" opacity="0.8"/>
    <circle cx="210"  cy="38"  r="1"   opacity="0.6"/>
    <circle cx="315"  cy="82"  r="1.2" opacity="0.75"/>
    <circle cx="425"  cy="52"  r="1"   opacity="0.65"/>
    <circle cx="510"  cy="92"  r="1.5" opacity="0.8"/>
    <circle cx="595"  cy="62"  r="1.2" opacity="0.7"/>
    <circle cx="678"  cy="32"  r="1"   opacity="0.6"/>
    <circle cx="775"  cy="78"  r="1.5" opacity="0.8"/>
    <circle cx="880"  cy="48"  r="1.2" opacity="0.7"/>
    <circle cx="968"  cy="88"  r="1"   opacity="0.65"/>
    <circle cx="1055" cy="56"  r="1.5" opacity="0.8"/>
    <circle cx="1140" cy="82"  r="1.2" opacity="0.7"/>
    <circle cx="80"   cy="148" r="1"   opacity="0.55"/>
    <circle cx="192"  cy="165" r="1.2" opacity="0.65"/>
    <circle cx="358"  cy="142" r="1.5" opacity="0.6"/>
    <circle cx="490"  cy="172" r="1"   opacity="0.55"/>
    <circle cx="628"  cy="152" r="1.2" opacity="0.65"/>
    <circle cx="762"  cy="175" r="1.5" opacity="0.6"/>
    <circle cx="895"  cy="158" r="1"   opacity="0.55"/>
    <circle cx="1022" cy="145" r="1.2" opacity="0.65"/>
    <circle cx="1165" cy="170" r="1.5" opacity="0.6"/>
    <circle cx="172"  cy="238" r="1"   opacity="0.5"/>
    <circle cx="418"  cy="255" r="1.2" opacity="0.55"/>
    <circle cx="652"  cy="235" r="1"   opacity="0.5"/>
    <circle cx="912"  cy="248" r="1.2" opacity="0.55"/>
    <circle cx="1112" cy="240" r="1"   opacity="0.5"/>
  </g>

  <!-- CRESCENT MOON (upper left) -->
  <circle cx="175" cy="160" r="68" fill="url(#moonHalo)"/>
  <circle cx="175" cy="160" r="40" fill="#ccdcf8" opacity="0.95"/>
  <!-- Cutout to make crescent -->
  <circle cx="196" cy="152" r="32" fill="#0c1c40"/>

  <!-- 12 STARS (Uzbekistan flag pattern — 3 rows: 3, 4, 5) -->
  <!-- Row 1: 3 stars -->
  <g fill="#ccdcf8" opacity="0.9">
    <!-- Row 1 -->
    <polygon points="258,107 260,113 267,113 261,117 264,124 258,120 252,124 255,117 249,113 256,113"/>
    <polygon points="280,107 282,113 289,113 283,117 286,124 280,120 274,124 277,117 271,113 278,113"/>
    <polygon points="302,107 304,113 311,113 305,117 308,124 302,120 296,124 299,117 293,113 300,113"/>
    <!-- Row 2 -->
    <polygon points="247,130 249,136 256,136 250,140 253,147 247,143 241,147 244,140 238,136 245,136"/>
    <polygon points="269,130 271,136 278,136 272,140 275,147 269,143 263,147 266,140 260,136 267,136"/>
    <polygon points="291,130 293,136 300,136 294,140 297,147 291,143 285,147 288,140 282,136 289,136"/>
    <polygon points="313,130 315,136 322,136 316,140 319,147 313,143 307,147 310,140 304,136 311,136"/>
    <!-- Row 3 -->
    <polygon points="235,153 237,159 244,159 238,163 241,170 235,166 229,170 232,163 226,159 233,159"/>
    <polygon points="257,153 259,159 266,159 260,163 263,170 257,166 251,170 254,163 248,159 255,159"/>
    <polygon points="279,153 281,159 288,159 282,163 285,170 279,166 273,170 276,163 270,159 277,159"/>
    <polygon points="301,153 303,159 310,159 304,163 307,170 301,166 295,170 298,163 292,159 299,159"/>
    <polygon points="323,153 325,159 332,159 326,163 329,170 323,166 317,170 320,163 314,159 321,159"/>
  </g>

  <!-- ====== BUILDINGS ====== -->

  <!-- Far background buildings (faint, behind everything) -->
  <rect x="60"   y="475" width="75"  height="105" fill="#07101e" opacity="0.8"/>
  <rect x="145"  y="490" width="60"  height="90"  fill="#060e1a" opacity="0.8"/>
  <rect x="215"  y="480" width="55"  height="100" fill="#070f1c" opacity="0.8"/>
  <rect x="985"  y="425" width="80"  height="155" fill="#06101e" opacity="0.8"/>
  <rect x="1075" y="455" width="65"  height="125" fill="#050e1a" opacity="0.8"/>
  <rect x="1150" y="475" width="55"  height="105" fill="#040c16" opacity="0.8"/>

  <!-- Left far lit windows -->
  <g fill="#ffe090" opacity="0.35">
    <rect x="72"  y="492" width="7" height="9"/>
    <rect x="90"  y="492" width="7" height="9"/>
    <rect x="113" y="492" width="7" height="9"/>
    <rect x="162" y="508" width="6" height="8"/>
    <rect x="237" y="498" width="6" height="8"/>
