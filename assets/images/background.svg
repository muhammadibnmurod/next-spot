  <!-- TRADITIONAL DOMED BUILDING (Islamic/Uzbek architecture) -->
  <rect x="348" y="432" width="104" height="148" fill="url(#bldg)"/>
  <!-- Drum -->
  <rect x="368" y="420" width="64" height="22" fill="#172248"/>
  <!-- Main dome -->
  <ellipse cx="400" cy="420" rx="52" ry="28" fill="#142040"/>
  <!-- Portal arch (pishtaq) -->
  <path d="M 375,432 Q 400,400 425,432 L 425,580 L 375,580 Z" fill="#0e1a35"/>
  <path d="M 384,432 Q 400,412 416,432 L 416,480 L 384,480 Z" fill="#080f20"/>
  <!-- Side minarets -->
  <rect x="337" y="390" width="14" height="90"  fill="url(#bldgDk)"/>
  <ellipse cx="344" cy="390" rx="7" ry="10" fill="#10193a"/>
  <polygon points="344,368 340,390 348,390" fill="#10183a"/>
  <rect x="449" y="390" width="14" height="90"  fill="url(#bldgDk)"/>
  <ellipse cx="456" cy="390" rx="7" ry="10" fill="#10193a"/>
  <polygon points="456,368 452,390 460,390" fill="#10183a"/>
  <!-- Minaret windows -->
  <g fill="#ffe090" opacity="0.65">
    <rect x="340" y="405" width="8" height="8" rx="1"/>
    <rect x="452" y="405" width="8" height="8" rx="1"/>
  </g>
  <!-- Dome tile pattern hint -->
  <ellipse cx="400" cy="416" rx="28" ry="14" fill="none" stroke="#1e3060" stroke-width="1.5" opacity="0.5"/>

  <!-- TASHKENT TV TOWER (iconic needle) -->
  <!-- Base -->
  <rect x="487" y="452" width="26" height="38" fill="url(#bldg)"/>
  <!-- Legs spread -->
  <polygon points="490,490 500,430 510,490" fill="#15204a"/>
  <!-- Tower needle -->
  <polygon points="500,248 497,432 503,432" fill="#152040"/>
  <!-- Observation deck disk -->
  <ellipse cx="500" cy="350" rx="20" ry="10" fill="#162248"/>
  <ellipse cx="500" cy="345" rx="15" ry="6"  fill="#1a2a58"/>
  <!-- Deck lights -->
  <g fill="#ffe090" opacity="0.6">
    <rect x="483" y="347" width="7" height="3" rx="1"/>
    <rect x="510" y="347" width="7" height="3" rx="1"/>
  </g>
  <!-- Top antenna -->
  <line x1="500" y1="250" x2="500" y2="228" stroke="#1a2850" stroke-width="2"/>
  <circle cx="500" cy="226" r="4.5" fill="#ff4422" opacity="0.92"/>

  <!-- HOTEL UZBEKISTAN / Government building (Soviet Baroque) -->
  <rect x="552" y="402" width="132" height="178" fill="url(#bldg)"/>
  <!-- Stepped crown -->
  <rect x="567" y="368" width="102" height="44" fill="#1a2850"/>
  <rect x="590" y="338" width="56"  height="40" fill="#182448"/>
  <rect x="604" y="312" width="28"  height="36" fill="#162040"/>
  <!-- Horizontal cornice -->
  <rect x="554" y="398" width="128" height="7" fill="#202e60"/>
