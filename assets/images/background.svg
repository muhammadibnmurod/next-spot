  <g fill="#ffe090" opacity="0.75">
    <rect x="563" y="417" width="9" height="13" rx="1"/>
    <rect x="578" y="417" width="9" height="13" rx="1"/>
    <rect x="596" y="417" width="9" height="13" rx="1"/>
    <rect x="614" y="417" width="9" height="13" rx="1"/>
    <rect x="632" y="417" width="9" height="13" rx="1"/>
    <rect x="650" y="417" width="9" height="13" rx="1"/>
    <rect x="668" y="417" width="9" height="13" rx="1"/>
    <rect x="563" y="447" width="9" height="13" rx="1"/>
