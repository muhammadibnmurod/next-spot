  <rect x="752" y="282" width="78" height="298" fill="#0e192e"/>
  <!-- Glass highlight -->
  <rect x="752" y="282" width="39" height="298" fill="#122040" opacity="0.35"/>
  <!-- Windows -->
  <g fill="#ffe090" opacity="0.7">
    <rect x="762" y="302" width="8" height="11" rx="1"/>
    <rect x="780" y="302" width="8" height="11" rx="1"/>
    <rect x="802" y="302" width="8" height="11" rx="1"/>
    <rect x="762" y="328" width="8" height="11" rx="1"/>
    <rect x="780" y="328" width="8" height="11" rx="1"/>
    <rect x="762" y="354" width="8" height="11" rx="1"/>
    <rect x="802" y="354" width="8" height="11" rx="1"/>
    <rect x="780" y="380" width="8" height="11" rx="1"/>
    <rect x="802" y="380" width="8" height="11" rx="1"/>
    <rect x="762" y="406" width="8" height="11" rx="1"/>
    <rect x="802" y="422" width="8" height="11" rx="1"/>
  </g>
  <g fill="#162040" opacity="0.8">
    <rect x="802" y="328" width="8" height="11" rx="1"/>
    <rect x="780" y="354" width="8" height="11" rx="1"/>
    <rect x="762" y="380" width="8" height="11" rx="1"/>
    <rect x="780" y="406" width="8" height="11" rx="1"/>
    <rect x="762" y="422" width="8" height="11" rx="1"/>
    <rect x="780" y="422" width="8" height="11" rx="1"/>
  </g>
  <!-- Triangular roof + spire -->
  <polygon points="752,284 791,260 830,284" fill="#0a1322"/>
  <line x1="791" y1="260" x2="791" y2="238" stroke="#0e1828" stroke-width="3"/>
  <circle cx="791" cy="236" r="4" fill="#ff4422" opacity="0.85"/>

  <!-- MODERN SKYSCRAPER 2 -->
  <rect x="843" y="344" width="62" height="236" fill="#0b1522"/>
  <g fill="#ffe090" opacity="0.65">
    <rect x="854" y="364" width="7" height="10" rx="1"/>
    <rect x="870" y="364" width="7" height="10" rx="1"/>
    <rect x="888" y="364" width="7" height="10" rx="1"/>
    <rect x="854" y="390" width="7" height="10" rx="1"/>
    <rect x="888" y="390" width="7" height="10" rx="1"/>
    <rect x="870" y="416" width="7" height="10" rx="1"/>
    <rect x="854" y="442" width="7" height="10" rx="1"/>
    <rect x="888" y="442" width="7" height="10" rx="1"/>
  </g>

  <!-- MODERN TOWER 3 -->
  <rect x="922" y="364" width="52" height="216" fill="#091220"/>
  <g fill="#ffe090" opacity="0.6">
    <rect x="932" y="382" width="6" height="9" rx="1"/>
    <rect x="946" y="382" width="6" height="9" rx="1"/>
    <rect x="960" y="382" width="6" height="9" rx="1"/>
    <rect x="932" y="406" width="6" height="9" rx="1"/>
    <rect x="960" y="406" width="6" height="9" rx="1"/>
    <rect x="946" y="430" width="6" height="9" rx="1"/>
  </g>

  <!-- GROUND -->
  <rect x="0" y="578" width="1200" height="222" fill="url(#ground)"/>
  <!-- Horizon glow strip -->
  <rect x="0" y="573" width="1200" height="7" fill="#1a3888" opacity="0.65"/>
  <!-- City glow reflection -->
  <rect x="0" y="580" width="1200" height="70" fill="url(#cityGlow)"/>

  <!-- Uzbekistan flag color stripes at bottom (subtle) -->
  <rect x="0" y="768" width="1200" height="10" fill="#009AB5" opacity="0.55"/>
  <rect x="0" y="780" width="1200" height="6"  fill="#ffffff"  opacity="0.2"/>
  <rect x="0" y="788" width="1200" height="10" fill="#1DB954"  opacity="0.55"/>

  <!-- City name (very subtle) -->
  <text x="600" y="752" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="13" font-weight="300" fill="white" opacity="0.22"
        letter-spacing="12">TOSHKENT  ·  O'ZBEKISTON</text>
</svg>
