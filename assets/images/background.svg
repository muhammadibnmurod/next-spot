    <rect x="632" y="447" width="9" height="13" rx="1"/>
    <rect x="668" y="447" width="9" height="13" rx="1"/>
    <rect x="578" y="477" width="9" height="13" rx="1"/>
    <rect x="614" y="477" width="9" height="13" rx="1"/>
    <rect x="650" y="477" width="9" height="13" rx="1"/>
  </g>
  <!-- Dark windows -->
  <g fill="#101e3a" opacity="0.7">
    <rect x="578" y="447" width="9" height="13" rx="1"/>
    <rect x="614" y="447" width="9" height="13" rx="1"/>
    <rect x="650" y="447" width="9" height="13" rx="1"/>
    <rect x="563" y="477" width="9" height="13" rx="1"/>
    <rect x="632" y="477" width="9" height="13" rx="1"/>
    <rect x="668" y="477" width="9" height="13" rx="1"/>
